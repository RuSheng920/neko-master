name: Agent Release

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set-up-Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build-and-Package
      run: |
        mkdir -p dist/pkg dist/release
        # 1. 编译 (进入目录编译再跳回来，避免路径混乱)
        cd apps/agent && GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o ../../dist/pkg/neko-agent . && cd ../..
        
        # 2. 生成 nekoagent 脚本 (使用 printf 避免 EOF 缩进陷阱)
        printf '#!/usr/bin/env sh\nset -eu\nPROG="nekoagent"\nAGENT_BIN="/system/bin/neko-agent"\nBASE_DIR="/data/adb/neko-agent"\nSTATE_DIR="$BASE_DIR/run"\nensure_dirs() { mkdir -p "$BASE_DIR" "$STATE_DIR"; }\nload_config() {\n  conf="$BASE_DIR/${1:-agent}.conf"\n  [ -f "$conf" ] || { echo "Error: $conf not found"; exit 1; }\n  config_raw=$(grep -v "^#" "$conf" | grep "=")\n  eval "$(echo "$config_raw" | sed "s/ *= */=/g" | awk -F= "{print \"NEKO_\" toupper(\$1) \"=\" \$2}")"\n}\ncase "$1" in\n  start)\n    ensure_dirs; load_config "${2:-agent}"\n    args="--server-url $NEKO_SERVER_URL --backend-id $NEKO_BACKEND_ID --backend-token $NEKO_BACKEND_TOKEN --gateway-type $NEKO_GATEWAY_TYPE --gateway-url $NEKO_GATEWAY_URL"\n    [ -n "${NEKO_LOG:-}" ] && args="$args --log=$NEKO_LOG"\n    nohup "$AGENT_BIN" $args >> "$STATE_DIR/${2:-agent}.log" 2>&1 &\n    echo $! > "$STATE_DIR/${2:-agent}.pid"\n    echo "Started." ;;\n  stop)\n    pid_f="$STATE_DIR/${2:-agent}.pid"\n    [ -f "$pid_f" ] && kill $(cat "$pid_f") && rm "$pid_f" && echo "Stopped." ;;\n  status)\n    pid_f="$STATE_DIR/${2:-agent}.pid"\n    [ -f "$pid_f" ] && kill -0 $(cat "$pid_f") 2>/dev/null && echo "Running" || echo "Stopped" ;;\n  *)\n    echo "Usage: nekoagent {start|stop|status} [name]" ;;\nesac' > dist/pkg/nekoagent
        
        chmod +x dist/pkg/nekoagent
        
        # 3. 打包
        cd dist/pkg && sha256sum neko-agent nekoagent > checksums.txt && tar -czf ../release/neko-agent-android-arm64.tar.gz .

    - name: Upload-Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neko-agent-android-arm64
        path: dist/release/neko-agent-android-arm64.tar.gz

    - name: Create-Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/release/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
