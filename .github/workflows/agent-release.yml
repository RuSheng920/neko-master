name: Build and Release Agent

on:
  push:
    tags:
      - 'agent-v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: linux
            arch: arm64 # 适配你的 OnePlus Ace 3V

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build archive
        run: |
          set -eu
          mkdir -p dist/release
          workdir="dist/pkg"
          mkdir -p "$workdir"
          
          # 1. 编译二进制
          cd apps/agent
          go build -trimpath -ldflags "-s -w" -o "$workdir/neko-agent" .

          # 2. 注入你要求的 agent.conf 适配版脚本
          cat <<'EOF' > "$workdir/nekoagent"
#!/usr/bin/env sh
set -eu
PROG="nekoagent"
AGENT_BIN="/system/bin/neko-agent"
BASE_DIR="/data/adb/neko-agent"
STATE_DIR="$BASE_DIR/run"

ensure_dirs() { mkdir -p "$BASE_DIR" "$STATE_DIR"; }
load_config() {
  conf="$BASE_DIR/${1:-agent}.conf"
  [ -f "$conf" ] || { echo "Error: $conf not found"; exit 1; }
  eval "$(grep -v '^#' "$conf" | grep '=' | sed 's/ *= */=/g' | awk -F= '{print "NEKO_" toupper($1) "=" $2}')"
}

case "$1" 在
  start)
    ensure_dirs
    load_config "${2:-agent}"
    args="--server-url $NEKO_SERVER_URL --backend-id $NEKO_BACKEND_ID --backend-token $NEKO_BACKEND_TOKEN --gateway-type $NEKO_GATEWAY_TYPE --gateway-url $NEKO_GATEWAY_URL"
    nohup "$AGENT_BIN" $args >> "$STATE_DIR/${2:-agent}.log" 2>&1 &
    echo $! > "$STATE_DIR/${2:-agent}.pid"
    echo "Started."
    ;;
  stop)
    pid_f="$STATE_DIR/${2:-agent}.pid"
    [ -f "$pid_f" ] && kill $(cat "$pid_f") && rm "$pid_f" && echo "Stopped."
    ;;
  *) echo "Usage: nekoagent {start|stop} [name]" ;;
esac
EOF
          chmod +x "$workdir/nekoagent"

          # 3. 打包
          cd "$workdir"
          tar -czf "../../dist/release/neko-agent-android-${{ matrix.arch }}.tar.gz" .

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/release/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
