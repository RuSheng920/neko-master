name: Agent Release

on:
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write

jobs:
  test:
    name: Test Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Package ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/agent
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- 常规平台 ---
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: armv7
            goarch: arm
            goarm: "7"
          - os: linux
            arch: mips
            gomips: softfloat
          - os: linux
            arch: mipsle
            gomips: softfloat
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          # --- 安卓平台修正 ---
          - os: android
            arch: arm64-v8a
            goarch: arm64
            ndk_target: aarch64-linux-android
            android_api: 24
          - os: android
            arch: armeabi-v7a
            goarch: arm
            goarm: "7"
            ndk_target: armv7a-linux-androideabi # 32位安卓编译器前缀不同
            android_api: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod

      - name: Setup Android NDK
        id: setup-ndk # 必须添加 ID 才能在后续环境变量中引用
        if: matrix.os == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build archive
        env:
          # 仅在安卓平台开启 CGO，其他平台建议关闭以提高可移植性
          CGO_ENABLED: ${{ matrix.os == 'android' && '1' || '0' }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch || matrix.arch }}
          GOARM: ${{ matrix.goarm || '' }}
          GOMIPS: ${{ matrix.gomips || '' }}
          VERSION: ${{ github.ref_name }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -eu
          mkdir -p dist/release
          workdir="dist/pkg"
          rm -rf "$workdir" && mkdir -p "$workdir"

          VERSION_PLAIN="${VERSION#agent-v}"
          
          # 针对安卓的特殊编译逻辑
          EXTRA_FLAGS=""
          if [ "${{ matrix.os }}" = "android" ]; then
              # NDK 编译器路径拼接
              export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_target }}${{ matrix.android_api }}-clang"
              export CXX="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_target }}${{ matrix.android_api }}-clang++"
              # 安卓必须开启 PIE (Position Independent Executable) 才能在高版本系统运行
              EXTRA_FLAGS="-buildmode=pie"
          fi

          # 编译
          go build -trimpath $EXTRA_FLAGS \
            -ldflags "-s -w -X github.com/foru17/neko-master/apps/agent/internal/config.AgentVersion=${VERSION_PLAIN}" \
            -o "$workdir/neko-agent" .
          
          chmod +x "$workdir/neko-agent"

          # 归档命名
          archive_base="neko-agent_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}"
          tar -C "$workdir" -czf "dist/release/${archive_base}.tar.gz" neko-agent
          cp "dist/release/${archive_base}.tar.gz" "dist/release/neko-agent_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-release-${{ matrix.os }}-${{ matrix.arch }}
          path: apps/agent/dist/release/*.tar.gz

  checksums:
    name: Generate checksums
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: agent-release-*
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd dist/release
          sha256sum *.tar.gz > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: agent-release-checksums
          path: dist/release/checksums.txt

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: checksums
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: agent-release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/checksums.txt
