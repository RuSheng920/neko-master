name: Build Android Agent

on:
  push:
    tags:
      - 'agent-v*' # 只有当你推送到 agent-v 开头的标签时才触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build and Package
        run: |
          set -eu
          mkdir -p dist/release
          workdir="dist/pkg"
          mkdir -p "$workdir"
          
          # 1. 编译针对安卓 arm64 的核心程序
          cd apps/agent
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o "$workdir/neko-agent" .

          # 2. 注入我们修改好的 .conf 适配版 nekoagent 脚本
          cat <<'EOF' > "$workdir/nekoagent"
#!/usr/bin/env sh
set -eu
PROG="nekoagent"
AGENT_BIN="/system/bin/neko-agent"
BASE_DIR="/data/adb/neko-agent"
STATE_DIR="$BASE_DIR/run"

ensure_dirs() { mkdir -p "$BASE_DIR" "$STATE_DIR"; }

load_config() {
  conf="$BASE_DIR/${1:-agent}.conf"
  [ -f "$conf" ] || { echo "Error: $conf not found"; exit 1; }
  config_raw=$(grep -v '^#' "$conf" | grep '=')
  eval "$(echo "$config_raw" | sed 's/ *= */=/g' | awk -F= '{print "NEKO_" toupper($1) "=" $2}')"
}

case "$1" 在
  start)
    ensure_dirs
    load_config "${2:-agent}"
    args="--server-url $NEKO_SERVER_URL --backend-id $NEKO_BACKEND_ID --backend-token $NEKO_BACKEND_TOKEN --gateway-type $NEKO_GATEWAY_TYPE --gateway-url $NEKO_GATEWAY_URL"
    [ -n "${NEKO_LOG:-}" ] && args="$args --log=$NEKO_LOG"
    nohup "$AGENT_BIN" $args >> "$STATE_DIR/${2:-agent}.log" 2>&1 &
    echo $! > "$STATE_DIR/${2:-agent}.pid"
    echo "Neko Agent [${2:-agent}] Started."
    ;;
  stop)
    pid_f="$STATE_DIR/${2:-agent}.pid"
    [ -f "$pid_f" ] && kill $(cat "$pid_f") && rm "$pid_f" && echo "Stopped."
    ;;
  status)
    pid_f="$STATE_DIR/${2:-agent}.pid"
    [ -f "$pid_f" ] && kill -0 $(cat "$pid_f") 2>/dev/null && echo "Running" || echo "Stopped"
    ;;
  *) echo "Usage: nekoagent {start|stop|status} [name]" ;;
esac
EOF
          chmod +x "$workdir/nekoagent"

          # 3. 打包并生成校验码
          cd "$workdir"
          sha256sum neko-agent nekoagent > checksums.txt
          tar -czf "../../dist/release/neko-agent-android-arm64.tar.gz" .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/release/neko-agent-android-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
