name: Agent Release

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch: # 新增：支持手动触发发布
    inputs:
      manual_version:
        description: '手动指定发布版本号 (例如 1.0.5-beta)'
        required: true
        default: 'manual-build'

permissions:
  contents: write

jobs:
  test:
    name: Test Agent
    runs-on: ubuntu-latest
    # ... (保持之前的测试步骤) ...
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
      - name: Run tests
        run: go test ./...

  build:
    name: Package ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/agent
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: android
            arch: arm64-v8a
            goarch: arm64
            ndk_target: aarch64-linux-android
            android_api: 24
          - os: android
            arch: armeabi-v7a
            goarch: arm
            goarm: "7"
            ndk_target: armv7a-linux-androideabi
            android_api: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod

      - name: Setup Android NDK
        id: setup-ndk
        if: matrix.os == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build archive
        env:
          CGO_ENABLED: ${{ matrix.os == 'android' && '1' || '0' }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch || matrix.arch }}
          GOARM: ${{ matrix.goarm || '' }}
          # 兼容手动输入和 Tag 触发
          VERSION: ${{ github.event.inputs.manual_version || github.ref_name }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -eu
          mkdir -p dist/release
          workdir="dist/pkg"
          rm -rf "$workdir" && mkdir -p "$workdir"
          VERSION_PLAIN="${VERSION#agent-v}"
          
          EXTRA_FLAGS=""
          if [ "${{ matrix.os }}" = "android" ]; then
              export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_target }}${{ matrix.android_api }}-clang"
              export CXX="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_target }}${{ matrix.android_api }}-clang++"
              EXTRA_FLAGS="-buildmode=pie"
          fi

          go build -trimpath $EXTRA_FLAGS \
            -ldflags "-s -w -X github.com/foru17/neko-master/apps/agent/internal/config.AgentVersion=${VERSION_PLAIN}" \
            -o "$workdir/neko-agent" .
          
          chmod +x "$workdir/neko-agent"
          tar -C "$workdir" -czf "dist/release/neko-agent_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" neko-agent

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-release-${{ matrix.os }}-${{ matrix.arch }}
          path: apps/agent/dist/release/*.tar.gz

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: agent-release-*
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd dist/release
          sha256sum *.tar.gz > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          # 手动触发时必须指定 tag_name，否则 Action 会因为找不到 ref 而失败
          tag_name: ${{ github.event.inputs.manual_version || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/checksums.txt
