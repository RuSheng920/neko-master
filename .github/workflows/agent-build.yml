name: Agent Build

于:
  pull_request:
    paths:
      - "apps/agent/**"
      - ".github/workflows/agent-build.yml"
  push:
    branches:
      - main
    paths:
      - "apps/agent/**"
  workflow_dispatch: # 新增：支持手动触发

jobs:
  test:
    name: Test Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod

      - name: Run tests
        run: go test ./...

  cross-build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/agent
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: android
            arch: arm64-v8a
            goarch: arm64
            ndk_target: aarch64-linux-android
            android_api: 24
          - os: android
            arch: armeabi-v7a
            goarch: arm
            goarm: "7"
            ndk_target: armv7a-linux-androideabi
            android_api: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod

      - name: Setup Android NDK
        id: setup-ndk
        if: matrix.os == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build binary
        env:
          CGO_ENABLED: ${{ matrix.os == 'android' && '1' || '0' }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch || matrix.arch }}
          GOARM: ${{ matrix.goarm || '' }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p dist
          EXTRA_FLAGS=""
          if [ "${{ matrix.os }}" = "android" ]; then
              export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_target }}${{ matrix.android_api }}-clang"
              export CXX="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_target }}${{ matrix.android_api }}-clang++"
              EXTRA_FLAGS="-buildmode=pie"
          fi
          go build -trimpath $EXTRA_FLAGS -ldflags "-s -w" -o "dist/neko-agent-${{ matrix.os }}-${{ matrix.arch }}" .

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-build-${{ matrix.os }}-${{ matrix.arch }}
          path: apps/agent/dist/neko-agent-*
          retention-days: 1
